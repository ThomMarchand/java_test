<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Java</title>
  </head>
  <body>
    <h1>Créer un utilisateur</h1>

    <form id="userForm">
      <input type="text" id="name" placeholder="Nom" required /><br />
      <input type="email" id="email" placeholder="Email" required /><br />
      <input type="number" id="age" placeholder="Âge" required /><br />

      <button type="submit">Créer</button>
    </form>

    <h2>Utilisateurs</h2>
    <ul id="userList"></ul>

    <script>
      const submitBtn = document.querySelector("button");

      async function loadUsers() {
        const res = await fetch("/api/users");
        const users = await res.json();
        const list = document.getElementById("userList");

        list.innerHTML = users
          .map(
            (u) =>
              `<li>${u.name} — ${u.email}
                    <button onclick="deleteUser('${u.id}')">Supprimer</button>
                </li>`,
          )
          .join("");
      }

      document
        .getElementById("userForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const params = new URLSearchParams({
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            age: document.getElementById("age").value,
          });

          const res = await fetch("/api/users", {
            method: "POST",
            body: params,
          });

          if (!res.ok) {
            const errorMessage = await res.text();

            submitBtn.innerHTML = `
              <p style="color: red;">${errorMessage}</p>
            `;
          } else {
            e.target.reset();
            loadUsers();
          }
        });

      async function deleteUser(id) {
        const res = await fetch("/api/users/" + "coucou", { method: "DELETE" });

        if (!res.ok) {
          const errorMessage = await res.text();

          submitBtn.innerHTML = `
              <p style="color: red;">${errorMessage}</p>
            `;
        } else {
          loadUsers();
        }
      }

      loadUsers();
    </script>
  </body>
</html>
